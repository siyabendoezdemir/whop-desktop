<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whop</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0b0b0f;
        color: #f5f5f7;
      }
      .splash {
        text-align: center;
        opacity: 0.85;
      }
      .spinner {
        width: 28px;
        height: 28px;
        margin: 16px auto 0;
        border: 3px solid rgba(255, 255, 255, 0.2);
        border-top-color: #f5f5f7;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!--
      Placeholder/fallback frontend only. The real window loads https://whop.com
      directly as a top-level external URL from the Rust backend.
    -->
    <div class="splash">
      <div>Loading Whop…</div>
      <div class="spinner"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
